<!DOCTYPE html>
<html lang="en"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html">
<f:view>
    <f:metadata>
        <f:event type="preRenderView" listener="#{LoginBean.redirigirSiAutenticado}"/>
    </f:metadata>

    <h:head>
        <title>Ingreso - Quiniela Mundial 2026</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
        <link rel="stylesheet" href="#{request.contextPath}/resources/css/styles.css"/>
    </h:head>
    <h:body>
        <div class="container py-4 py-md-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="p-4 p-md-5 shadow-sm wc26-header mb-4">
                        <h1 class="h3 mb-2">Quiniela Mundial <span class="wc26-highlight">2026</span></h1>
                        <p class="mb-0">Ingrese su correo para identificar sus predicciones.</p>
                    </div>

                    <div class="card shadow-sm border-0">
                        <div class="card-body p-4">
                            <h2 class="h5 wc26-title mb-3">Iniciar sesion</h2>

                            <h:form prependId="false">
                                <div class="mb-3">
                                    <h:outputLabel for="correo" value="Correo electronico" styleClass="form-label fw-semibold"/>
                                    <h:inputText id="correo" value="#{LoginBean.correo}" required="true"
                                                 label="Correo electronico" styleClass="form-control">
                                        <f:validateRegex pattern="^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+$"/>
                                    </h:inputText>
                                </div>

                                <h:commandButton value="Entrar" action="#{LoginBean.iniciarSesion}" styleClass="btn wc26-btn px-4"/>

                                <div class="mt-3">
                                    <h:messages styleClass="text-danger"/>
                                </div>
                            </h:form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </h:body>
</f:view>
</html>
