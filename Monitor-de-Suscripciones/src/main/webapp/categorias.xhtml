<!DOCTYPE html>
<html lang="es"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces">
<f:view>
    <h:head><title>Gestion de Categorias</title></h:head>
    <h:body>
        <h:form rendered="#{sessionBean.admin}">
            <p:growl showDetail="true"/>
            <p:menubar>
                <p:menuitem value="Dashboard" outcome="dashboard.xhtml"/>
                <p:menuitem value="Salir" action="#{sessionBean.logout}"/>
            </p:menubar>

            <p:panel header="Categoria" style="margin-top:12px;">
                <h:panelGrid columns="2" cellpadding="8">
                    <h:outputText value="Nombre"/>
                    <p:inputText value="#{categoriaBean.categoriaActual.nombre}"/>
                    <h:outputText value="Descripcion"/>
                    <p:inputText value="#{categoriaBean.categoriaActual.descripcion}"/>
                </h:panelGrid>
                <p:commandButton value="Guardar" actionListener="#{categoriaBean.guardar}" update="@form"/>
                <p:spacer width="6"/>
                <p:commandButton value="Nuevo" actionListener="#{categoriaBean.nueva}" update="@form"/>
            </p:panel>

            <p:dataTable value="#{categoriaBean.categorias}" var="c" style="margin-top:12px;">
                <p:column headerText="Nombre"><h:outputText value="#{c.nombre}"/></p:column>
                <p:column headerText="Descripcion"><h:outputText value="#{c.descripcion}"/></p:column>
                <p:column headerText="Acciones">
                    <p:commandButton actionListener="#{categoriaBean.editar(c)}" update="@form" icon="pi pi-check" styleClass="rounded-button ui-button-success"/>
                    <p:spacer width="6"/>
                    <p:commandButton actionListener="#{categoriaBean.eliminar(c)}" update="@form" icon="pi pi-trash" styleClass="rounded-button ui-button-danger"/>
                </p:column>
            </p:dataTable>
        </h:form>

        <h:panelGroup rendered="#{!sessionBean.admin}">
            <h3>Acceso restringido solo para administradores.</h3>
            <p><h:link value="Volver" outcome="dashboard.xhtml"/></p>
        </h:panelGroup>
    </h:body>
</f:view>
</html>
