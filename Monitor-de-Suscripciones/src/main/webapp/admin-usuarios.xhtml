<!DOCTYPE html>
<html lang="es"
      xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="jakarta.faces.core"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces">
<f:view>
    <h:head><title>Aprobacion y Reseteo de Usuarios</title></h:head>
    <h:body>
        <h:form rendered="#{sessionBean.admin}">
            <p:growl showDetail="true"/>
            <p:menubar>
                <p:menuitem value="Dashboard" outcome="dashboard.xhtml"/>
                <p:menuitem value="Salir" action="#{sessionBean.logout}"/>
            </p:menubar>

            <p:panel header="Configurar password de reseteo" style="margin-top:12px;">
                <h:panelGrid columns="2">
                    <h:outputText value="Nueva password:"/>
                    <p:password value="#{adminBean.nuevaPassword}" feedback="true" promptLabel="Ingresa tu contraseña"
                                weakLabel="Débil" goodLabel="Buena" strongLabel="Fuerte"
                                toggleMask="true" redisplay="true"/>
                </h:panelGrid>
            </p:panel>

            <p:panel header="Usuarios pendientes de aprobacion" style="margin-top:12px;">
                <p:dataTable value="#{adminBean.pendientes}" var="u">
                    <p:column headerText="Nombre"><h:outputText value="#{u.nombre}"/></p:column>
                    <p:column headerText="Correo"><h:outputText value="#{u.correo}"/></p:column>
                    <p:column headerText="Acciones">
                        <p:commandButton value="Aprobar" actionListener="#{adminBean.aprobar(u)}" update="@form" styleClass="rounded-button ui-button-success"/>
                        <p:spacer width="6"/>
                        <p:commandButton value="Resetear Password" actionListener="#{adminBean.resetPassword(u)}" update="@form" styleClass="rounded-button ui-button-warning"/>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:form>

        <h:panelGroup rendered="#{!sessionBean.admin}">
            <h3>Acceso restringido solo para administradores.</h3>
            <p><h:link value="Volver" outcome="dashboard.xhtml"/></p>
        </h:panelGroup>
    </h:body>
</f:view>
</html>
